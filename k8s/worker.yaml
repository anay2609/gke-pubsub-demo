apiVersion: apps/v1

kind: Deployment

metadata:
  name: worker

spec:
  replicas: 1

  selector:
    matchLabels:
      app: worker

  template:

    metadata:
      labels:
        app: worker

    spec:

      containers:

      - name: worker

        image: asia-south1-docker.pkg.dev/gke-demo-project-497408/demo-repo/worker:v1

        volumeMounts:

        - name: gcp

          mountPath: /app/key

      volumes:

      - name: gcp

        secret:

          secretName: gcp-secret
